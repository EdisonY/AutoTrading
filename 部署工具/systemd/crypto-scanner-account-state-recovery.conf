[Service]
# Testnet recovery window: keep pre-entry account risk checks from failing just
# because services waited through a Binance cooldown. Post-submit confirmation
# still requires state observed after order submission or the controlled REST
# confirmation fallback.
Environment=BINANCE_ACCOUNT_STATE_CACHE_MAX_AGE_SEC=7200
Environment=CENTRAL_ACCOUNT_STATE_TARGET_MAX_AGE_SEC=7200
Environment=CENTRAL_ACCOUNT_STATE_CONFIRM_MAX_AGE_SEC=15
Environment=CENTRAL_ACCOUNT_STATE_CONFIRM_REST_FALLBACK_ENABLED=1
